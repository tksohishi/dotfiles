# TODO: Codex does not support config.local.toml or symlinks for config.toml.
# Tracked base config is merged with local [projects] entries by install.sh.
# https://github.com/openai/codex/issues/11061

sandbox_mode = "workspace-write"
approval_policy = "on-request"

model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
personality = "pragmatic"

web_search = "live"
service_tier = "fast"

[execpolicy]
user_rules = ["~/.codex/rules/default.rules"]

[analytics]
enabled = false

[feedback]
enabled = false

[tui]
status_line = [
  "git-branch",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
  "model-with-reasoning",
]

[tui.keymap.editor]
# 0.128.0's new keymap dropped alt-enter from insert_newline defaults.
# Ghostty translates Shift+Enter to ESC+CR (Alt+Enter), so re-bind it here.
insert_newline = ["alt-enter", "shift-enter", "ctrl-j", "ctrl-m"]

[sandbox_workspace_write]
network_access = true
writable_roots = ["~/.cache/uv"]

# Hook scripts live in dotagents/hooks/ (shared with Claude Code via
# ~/.claude/hooks symlink set up by install.sh). When changing the hook
# wiring here, mirror the change in dotclaude/settings.json.
[hooks]

[[hooks.PreToolUse]]
matcher = '^Bash$'

[[hooks.PreToolUse.hooks]]
type = "command"
command = "$HOME/.codex/hooks/agent-browser-context.sh"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "$HOME/.codex/hooks/bash-antipatterns.sh"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "$HOME/.codex/hooks/git-commit-subject.sh"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "$HOME/.codex/hooks/httpie-flag-order.sh"

[[hooks.PostToolUse]]
matcher = '^Bash$'

[[hooks.PostToolUse.hooks]]
type = "command"
command = "$HOME/.codex/hooks/bash-verify-reminder.sh"
