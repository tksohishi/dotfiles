# TODO: Codex does not support config.local.toml or symlinks for config.toml.
# Tracked base config is merged with local [projects] entries by install.sh.
# https://github.com/openai/codex/issues/11061

model = "gpt-5.2"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

web_search = "live"

[analytics]
enabled = false

[feedback]
enabled = false

[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
