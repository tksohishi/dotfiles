description = "Release version $ARGUMENTS"
prompt = """

Release a new version of the current project. If a project-local `/github-release` command exists (`.claude/commands/github-release.md`), defer to it instead.

## Step 1: Determine version

If `$ARGUMENTS` specifies a version (e.g. `1.2.0`, `v1.2.0`), use that. Strip the leading `v` for the version number; use `v`-prefixed form for tags.

If no version argument is provided:

1. Find the latest tag: `git describe --tags --abbrev=0`
2. List commits since that tag: `git log $(git describe --tags --abbrev=0)..HEAD --oneline`
3. Assess what kind of bump is appropriate based on the commits:
   - **Major**: breaking changes (for pre-1.0 projects, breaking changes bump minor instead)
   - **Minor**: new features
   - **Patch**: bug fixes, docs, refactors
4. Present 2-3 version options to the user using AskUserQuestion, with reasoning for each

If there are no existing tags, suggest `0.1.0` or `1.0.0` and ask the user.

## Step 2: Detect project type and bump version

Check for manifest files in the project root and update the version accordingly:

**Swift** (`Package.swift` exists):
- Find and update `Info.plist` using `/usr/libexec/PlistBuddy -c \"Set :CFBundleShortVersionString <version>\" <path>/Info.plist`

**Python** (`pyproject.toml` exists):
- Update the `version` field in `pyproject.toml`
- Run `uv sync` if `uv.lock` exists

**Node** (`package.json` exists):
- Update the `version` field in `package.json`
- Do NOT run `npm version` or `pnpm version` (they auto-commit/tag)

**Go** (`go.mod` exists):
- Tag only; Go derives version from git tags

**Other** (Makefile, or version derived from git tags):
- No file updates needed; tag only

If none of the above match, ask the user whether any files need a version update.

## Step 3: Commit version changes

If any files were modified in Step 2:

```
git add <changed files>
git commit -m \"Bump version to <version>\"
```

Skip this step if no files were changed (tag-only projects).

## Step 4: Push branch

```
git push
```

Push the branch only. The tag is created as part of Step 6 via `gh release create --target`.

## Step 5: Draft release notes

Build grouped release notes from the commit range since the previous tag.

1. Get the previous tag: `git describe --tags --abbrev=0` (captured in Step 1; reuse that value).
2. List commits: `git log <previous-tag>..HEAD --oneline`.
3. Group commit subjects under these sections; include a section only if it has entries:
   - **Breaking** — breaking API or behavior changes
   - **Features** — new capabilities
   - **Fixes** — bug fixes
   - **Changes** — behavior changes, tightened constraints, enforcement
   - **Docs** — documentation updates
4. Skip purely internal commits (refactors, formatting, CI-only, dependency bumps) unless they materially affect users.
5. Reuse commit subjects as-is when they are already concise; rewrite only when the subject is unclear without its body.
6. Format:

   ```
   ## Breaking
   - Subject

   ## Features
   - Subject

   ## Fixes
   - Subject
   ```

## Step 6: Create release (also creates the tag)

```
gh release create v<version> --target <branch-or-sha> --title v<version> --notes \"<drafted notes>\"
```

This creates the tag on the remote and the GitHub release with real notes in one operation. Use the current branch name (e.g., `main`) as `--target`; resolve it with `git rev-parse --abbrev-ref HEAD` if unsure.

The tag push triggers any release workflow. Workflows that use the idempotent pattern `if gh release view ...; then skip; else gh release create ...` will preserve the notes drafted here (verified against `tksohishi/wayfinder` and `tksohishi/tgcli` as of 2026-04-24). If the target project's workflow uses a different pattern, fall back to `gh release edit v<version> --notes \"<notes>\"` after the workflow completes.

Mirror the tag locally so the local repo sees it:

```
git fetch --tags
```

## Step 7: Verify the release

The release workflow builds artifacts and attaches them to the release. Delegate polling to `/loop` so it runs on a cadence without blocking the turn:

Invoke via the Skill tool: `loop` with args `check v<version> release workflow: run gh run list --limit 1; if still running or queued, keep looping; if success, run gh release view v<version> and stop; if failure, run gh run view <id> --log-failed and stop.`

`/loop` self-paces, runs the first check immediately, and schedules follow-ups until the workflow finishes.

## Constraints

- Follow semver; for pre-1.0 projects, minor = breaking
- Never add AI agent as commit author or co-author
- Use plain quoted strings for commit messages
"""
